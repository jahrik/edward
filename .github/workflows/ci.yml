---
name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: '3.13'
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src/edward
      - run: uv run pytest --cov=src/edward --cov-report=term-missing --cov-fail-under=100
